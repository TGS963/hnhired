services:
  db:
    image: pgvector/pgvector:pg16
    container_name: hnhired-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: hnhired
      POSTGRES_PASSWORD: hnhired
      POSTGRES_DB: hnhired
    ports:
      - "5432:5432"
    volumes:
      - hnhired-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hnhired -d hnhired"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  hnhired-pgdata:
